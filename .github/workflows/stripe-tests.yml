name: stripe-tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  stripe-tests:
    runs-on: ubuntu-latest
    env:
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      STRIPE_PRICE_PRO: price_test_pro
      STRIPE_PRICE_ULTRA: price_test_ultra
      NEXTAUTH_SECRET: nextauth_test_secret
      NEXTAUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stripe tests
        run: npm run test:stripe

      - name: Typecheck
        run: npx tsc --noEmit

name: stripe-tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  stripe-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stripe tests
        run: npm run test:stripe

      - name: Typecheck
        run: npx tsc --noEmit
